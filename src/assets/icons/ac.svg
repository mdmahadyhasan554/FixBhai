<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- AC unit — Air Conditioner -->
  <rect width="64" height="64" rx="16" fill="#dbeafe"/>
  <!-- AC body -->
  <rect x="10" y="20" width="44" height="24" rx="6" fill="#2563eb"/>
  <!-- Vents -->
  <line x1="18" y1="28" x2="46" y2="28" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="18" y1="34" x2="46" y2="34" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Power light -->
  <circle cx="48" cy="24" r="3" fill="#34d399"/>
  <!-- Air flow lines -->
  <path d="M20 48 Q24 44 28 48" stroke="#2563eb" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M28 48 Q32 44 36 48" stroke="#2563eb" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M36 48 Q40 44 44 48" stroke="#2563eb" stroke-width="2" stroke-linecap="round" fill="none"/>
</svg>
